name: Docs Sync Check

on:
  workflow_dispatch:

jobs:
  check-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout NetExec-Wiki
        uses: actions/checkout@v4
        with:
          path: wiki
          fetch-depth: 0 # Needed to fetch full git history for blame

      - name: Checkout NetExec Codebase
        uses: actions/checkout@v4
        with:
          repository: Pennyw0rth/NetExec
          path: code
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: pip install rich

      - name: Run Documentation Sync Checker
        run: |
          python wiki/.github/scripts/check_docs.py --wiki-dir wiki --code-dir code
